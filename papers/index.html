<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Exam Paper Builder - Questions & Answers Separate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: #f0f7ff;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 1.8rem;
            margin-bottom: 2rem;
        }

        h1, h2 {
            color: #1e3c72;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #5b6e8c;
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #2c3e66;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1.5px solid #dfe7ef;
            border-radius: 1rem;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .option-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .option-row input {
            flex: 1;
        }

        .btn-add-option, .btn-remove-option {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .button-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 1rem;
        }

        button {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: #2c7da0;
            color: white;
        }
        .btn-primary:hover {
            background: #1f5e7a;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
        }
        .btn-danger {
            background: #ffeae9;
            color: #b91c1c;
            border: 1px solid #f5c6cb;
        }

        .questions-list {
            margin-top: 1.5rem;
        }

        .question-item {
            background: #f9fafc;
            border-left: 4px solid #2c7da0;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-preview {
            flex: 1;
            font-size: 0.9rem;
        }

        .badge {
            background: #e2e8f0;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        hr {
            margin: 1.2rem 0;
            border: 0;
            height: 1px;
            background: #e2e8f0;
        }

        /* Print styles for PDF generation */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print {
                display: none;
            }
            .cover-page {
                page-break-after: always;
                break-after: page;
                margin: 0;
                padding: 1.5cm;
            }
            .questions-section, .answers-section {
                margin: 0;
                padding: 1.5cm;
            }
            .question-block, .answer-block {
                page-break-inside: avoid;
                break-inside: avoid;
                margin-bottom: 1.5rem;
                padding-bottom: 0.5rem;
                border-bottom: 1px solid #ddd;
            }
            .answers-section {
                page-break-before: always;
                break-before: page;
            }
            /* Font size for all question/answer text */
            .question-text, .option, .answer-text {
                font-size: 12pt !important;
                line-height: 1.4;
            }
            .question-number, .answer-number {
                font-size: 12pt !important;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Cover Page Settings -->
    <div class="card no-print">
        <h2>📄 Cover Page Settings</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="studentName" placeholder="e.g., Chan Tai Man">
            </div>
            <div class="form-group">
                <label>Class</label>
                <input type="text" id="studentClass" placeholder="e.g., 6A">
            </div>
            <div class="form-group">
                <label>Class Number</label>
                <input type="text" id="studentNumber" placeholder="e.g., 23">
            </div>
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" id="subject" value="Mathematics" placeholder="e.g., Physics, Chemistry">
        </div>
        <div class="form-group">
            <label>Rules / Instructions</label>
            <textarea id="rules" rows="3">1. Answer all questions.
2. Write your answers in the spaces provided.
3. Use a blue or black pen.
4. Show all working for long questions.</textarea>
        </div>
        <div class="form-group">
            <label>MC Marks per Question (Default)</label>
            <input type="number" id="mcMarksDefault" value="5" min="1" step="1">
        </div>
    </div>

    <!-- Question Builder -->
    <div class="card no-print">
        <h2>✏️ Add Questions</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Question Type</label>
                <select id="qType">
                    <option value="mc">Multiple Choice (MC)</option>
                    <option value="long">Long Answer</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Question Text</label>
            <textarea id="qText" rows="2" placeholder="Enter the question..."></textarea>
        </div>

        <!-- MC Options -->
        <div id="mcOptionsArea">
            <label>Options (for MC)</label>
            <div id="optionsContainer"></div>
            <button type="button" class="btn-add-option" id="addOptionBtn" style="margin-top: 0.5rem;">+ Add Option</button>
            <div class="form-group" style="margin-top: 0.5rem;">
                <label>Correct Answer Letter (A, B, C, D...)</label>
                <input type="text" id="correctLetter" placeholder="e.g., B" maxlength="1" style="width: 80px;">
            </div>
        </div>

        <!-- Long Answer Area -->
        <div id="longAnswerArea" style="display: none;">
            <div class="form-group">
                <label>Reference Answer (optional)</label>
                <textarea id="refAnswer" rows="3" placeholder="Provide a model answer..."></textarea>
            </div>
            <div class="form-group">
                <label>Marks for this question</label>
                <input type="number" id="longMarks" value="10" min="1" step="1" style="width: 100px;">
            </div>
        </div>

        <div class="button-bar">
            <button class="btn-primary" id="addBtn">➕ Add Question</button>
            <button class="btn-secondary" id="clearFormBtn">🗑️ Clear Form</button>
        </div>
    </div>

    <!-- Question List -->
    <div class="card no-print">
        <h2>📋 Questions (<span id="questionCount">0</span>)</h2>
        <div id="questionsList" class="questions-list"></div>
        <div class="button-bar">
            <button class="btn-primary" id="generatePdfBtn">📄 Generate PDF (Questions + Answers)</button>
            <button class="btn-secondary" id="clearAllBtn">🗑️ Clear All Questions</button>
        </div>
    </div>
</div>

<script>
    // ---------- Data ----------
    let questions = [];

    // DOM elements
    const qTypeSelect = document.getElementById('qType');
    const qTextArea = document.getElementById('qText');
    const mcOptionsDiv = document.getElementById('mcOptionsArea');
    const longAnswerDiv = document.getElementById('longAnswerArea');
    const optionsContainer = document.getElementById('optionsContainer');
    const correctLetterInput = document.getElementById('correctLetter');
    const refAnswerTextarea = document.getElementById('refAnswer');
    const longMarksInput = document.getElementById('longMarks');
    const addBtn = document.getElementById('addBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const questionsListDiv = document.getElementById('questionsList');
    const questionCountSpan = document.getElementById('questionCount');
    const generatePdfBtn = document.getElementById('generatePdfBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // Cover page elements
    const studentNameInput = document.getElementById('studentName');
    const studentClassInput = document.getElementById('studentClass');
    const studentNumberInput = document.getElementById('studentNumber');
    const subjectInput = document.getElementById('subject');
    const rulesTextarea = document.getElementById('rules');
    const mcMarksDefaultInput = document.getElementById('mcMarksDefault');

    // Current options for MC
    let currentOptions = ['Option A', 'Option B', 'Option C', 'Option D'];

    // Helper: toggle UI based on question type
    function toggleQuestionType() {
        const isMc = qTypeSelect.value === 'mc';
        mcOptionsDiv.style.display = isMc ? 'block' : 'none';
        longAnswerDiv.style.display = isMc ? 'none' : 'block';
        if (isMc) renderOptionsInputs();
    }

    // Render option inputs for MC
    function renderOptionsInputs() {
        optionsContainer.innerHTML = '';
        currentOptions.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const div = document.createElement('div');
            div.className = 'option-row';
            const input = document.createElement('input');
            input.type = 'text';
            input.value = opt;
            input.placeholder = `Option ${letter}`;
            input.addEventListener('input', (e) => { currentOptions[idx] = e.target.value; });
            const delBtn = document.createElement('button');
            delBtn.textContent = '✖';
            delBtn.className = 'btn-remove-option';
            delBtn.onclick = () => {
                if (currentOptions.length > 2) {
                    currentOptions.splice(idx, 1);
                    renderOptionsInputs();
                } else {
                    alert('At least two options required.');
                }
            };
            div.appendChild(input);
            div.appendChild(delBtn);
            optionsContainer.appendChild(div);
        });
        const addOptBtn = document.getElementById('addOptionBtn');
        if (addOptBtn) {
            addOptBtn.onclick = () => {
                if (currentOptions.length < 6) {
                    const newLetter = String.fromCharCode(65 + currentOptions.length);
                    currentOptions.push(`Option ${newLetter}`);
                    renderOptionsInputs();
                } else {
                    alert('Maximum 6 options.');
                }
            };
        }
    }

    // Get current question from form
    function getCurrentQuestion() {
        const type = qTypeSelect.value;
        const text = qTextArea.value.trim();
        if (!text) {
            alert('Please enter question text.');
            return null;
        }
        if (type === 'mc') {
            if (currentOptions.length < 2) {
                alert('At least two options required.');
                return null;
            }
            const letter = correctLetterInput.value.trim().toUpperCase();
            const letters = ['A','B','C','D','E','F'];
            if (!letters.includes(letter) || (letter.charCodeAt(0)-65) >= currentOptions.length) {
                alert(`Correct answer must be a letter A-${letters[currentOptions.length-1]}.`);
                return null;
            }
            return {
                type: 'mc',
                text: text,
                options: [...currentOptions],
                answer: letter,
                points: parseInt(mcMarksDefaultInput.value, 10) || 5
            };
        } else {
            const ref = refAnswerTextarea.value.trim();
            let points = parseInt(longMarksInput.value, 10);
            if (isNaN(points) || points < 1) points = 10;
            return {
                type: 'long',
                text: text,
                reference: ref || '(No reference)',
                points: points
            };
        }
    }

    // Add question to list
    function addQuestion() {
        const q = getCurrentQuestion();
        if (!q) return;
        questions.push(q);
        renderQuestionsList();
        clearForm();
    }

    // Clear form
    function clearForm() {
        qTextArea.value = '';
        currentOptions = ['Option A', 'Option B', 'Option C', 'Option D'];
        correctLetterInput.value = '';
        refAnswerTextarea.value = '';
        longMarksInput.value = '10';
        renderOptionsInputs();
        toggleQuestionType();
    }

    // Delete question
    function deleteQuestion(index) {
        questions.splice(index, 1);
        renderQuestionsList();
    }

    // Edit question
    function editQuestion(index) {
        const q = questions[index];
        qTypeSelect.value = q.type;
        qTextArea.value = q.text;
        if (q.type === 'mc') {
            currentOptions = [...q.options];
            correctLetterInput.value = q.answer;
        } else {
            refAnswerTextarea.value = q.reference;
            longMarksInput.value = q.points;
        }
        toggleQuestionType();
        renderOptionsInputs();
        questions.splice(index, 1);
        renderQuestionsList();
        document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
    }

    // Render question list
    function renderQuestionsList() {
        if (questions.length === 0) {
            questionsListDiv.innerHTML = '<div style="text-align:center; padding:1rem; color:#7f8c8d;">No questions added yet.</div>';
            questionCountSpan.textContent = '0';
            return;
        }
        let html = '';
        questions.forEach((q, idx) => {
            let preview = `${q.type === 'mc' ? 'MC' : 'Long'}: ${q.text.substring(0, 70)}${q.text.length > 70 ? '…' : ''}`;
            if (q.type === 'mc') {
                preview += ` (${q.options.length} options, answer: ${q.answer}, ${q.points} marks)`;
            } else {
                preview += ` (${q.points} marks)`;
            }
            html += `
                <div class="question-item">
                    <div class="question-preview">
                        <span class="badge">#${idx+1}</span> ${preview}
                    </div>
                    <div class="question-actions">
                        <button class="btn-secondary" onclick="editQuestion(${idx})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deleteQuestion(${idx})">🗑️ Delete</button>
                    </div>
                </div>
            `;
        });
        questionsListDiv.innerHTML = html;
        questionCountSpan.textContent = questions.length;
    }

    // Generate PDF with separate question and answer sections
    function generatePDF() {
        if (questions.length === 0) {
            alert('No questions to export.');
            return;
        }

        // Collect cover data
        const studentName = escapeHtml(studentNameInput.value.trim()) || '_________________';
        const studentClass = escapeHtml(studentClassInput.value.trim()) || '________';
        const studentNumber = escapeHtml(studentNumberInput.value.trim()) || '________';
        const subject = escapeHtml(subjectInput.value.trim()) || 'Subject';
        const paperTitle = `${subject} Mock Exam`;
        const rules = escapeHtml(rulesTextarea.value.trim()) || 'No specific rules.';
        const mcMarksDefault = parseInt(mcMarksDefaultInput.value, 10) || 5;

        // Calculate totals and LQ distribution
        const mcQuestions = questions.filter(q => q.type === 'mc');
        const longQuestions = questions.filter(q => q.type === 'long');
        const totalMcMarks = mcQuestions.reduce((sum, q) => sum + (q.points || mcMarksDefault), 0);
        let lqDistributionHtml = '';
        longQuestions.forEach((q, idx) => {
            lqDistributionHtml += `<li>Question ${idx+1} (${q.points} marks)</li>`;
        });
        const totalMarks = totalMcMarks + longQuestions.reduce((sum, q) => sum + q.points, 0);

        // Build print HTML
        let printHtml = `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>${paperTitle}</title>
            <style>
                body {
                    font-family: 'Segoe UI', 'Roboto', sans-serif;
                    margin: 0;
                    padding: 0;
                    background: white;
                }
                .cover-page {
                    padding: 1.5cm;
                    page-break-after: always;
                    break-after: page;
                }
                .questions-section, .answers-section {
                    padding: 1.5cm;
                }
                .question-block, .answer-block {
                    margin-bottom: 1.5rem;
                    page-break-inside: avoid;
                    break-inside: avoid;
                    border-bottom: 1px solid #ddd;
                    padding-bottom: 0.8rem;
                }
                .question-number, .answer-number {
                    font-weight: bold;
                    font-size: 12pt;
                    margin-bottom: 0.5rem;
                    color: #1e3c72;
                }
                .question-text, .option, .answer-text {
                    font-size: 12pt;
                    line-height: 1.4;
                }
                .question-text {
                    font-weight: 500;
                    margin-bottom: 0.8rem;
                }
                .options {
                    margin-left: 1rem;
                    margin-bottom: 0.8rem;
                }
                .option {
                    margin: 0.3rem 0;
                }
                .answer-text {
                    margin-top: 0.5rem;
                    padding: 0.5rem;
                    background: #f9fafc;
                    border-left: 3px solid #2c7da0;
                }
                .cover-title {
                    text-align: center;
                    font-size: 2rem;
                    margin: 1rem 0 2rem;
                }
                .student-info {
                    margin-bottom: 2rem;
                    border-bottom: 1px solid #ccc;
                    padding-bottom: 1rem;
                }
                .rules {
                    margin: 2rem 0;
                    padding: 1rem;
                    background: #f8f9fc;
                    border-left: 4px solid #2c7da0;
                }
                .marks-summary {
                    margin: 1rem 0;
                    padding: 1rem;
                    background: #eef2fa;
                }
                hr {
                    margin: 1rem 0;
                }
                .answers-section {
                    page-break-before: always;
                    break-before: page;
                }
                @media print {
                    body {
                        padding: 0;
                    }
                    .question-text, .option, .answer-text {
                        font-size: 12pt !important;
                    }
                }
            </style>
        </head>
        <body>
            <!-- Cover Page -->
            <div class="cover-page">
                <div class="student-info">
                    <p><strong>Name:</strong> ${studentName}</p>
                    <p><strong>Class:</strong> ${studentClass} &nbsp;&nbsp; <strong>Class No.:</strong> ${studentNumber}</p>
                </div>
                <div class="cover-title">${paperTitle}</div>
                <div class="rules">
                    <strong>Instructions:</strong><br>
                    ${rules.replace(/\n/g, '<br>')}
                </div>
                <div class="marks-summary">
                    <strong>Mark Distribution</strong><br>
                    <strong>Section A: Multiple Choice</strong><br>
                    Total marks: ${totalMcMarks} (${mcQuestions.length} questions × ${mcMarksDefault} marks each)<br>
                    <strong>Section B: Long Answer Questions</strong><br>
                    <ul>${lqDistributionHtml || '<li>No long questions</li>'}</ul>
                    <hr>
                    <strong>Total marks: ${totalMarks}</strong>
                </div>
                <div style="text-align: center; margin-top: 3rem;">Good luck!</div>
            </div>

            <!-- Questions Section (no answers) -->
            <div class="questions-section">
                <h2>Questions</h2>
        `;

        // Add questions (without answers)
        questions.forEach((q, idx) => {
            printHtml += `<div class="question-block">`;
            printHtml += `<div class="question-number">${idx+1}. ${q.type === 'mc' ? `Multiple Choice (${q.points} marks)` : `Long Answer (${q.points} marks)`}</div>`;
            printHtml += `<div class="question-text">${escapeHtml(q.text)}</div>`;
            if (q.type === 'mc') {
                printHtml += `<div class="options">`;
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                q.options.forEach((opt, optIdx) => {
                    printHtml += `<div class="option">${letters[optIdx]}. ${escapeHtml(opt)}</div>`;
                });
                printHtml += `</div>`;
            }
            printHtml += `</div>`;
        });

        printHtml += `</div>`;

        // Answers Section (new page)
        printHtml += `<div class="answers-section"><h2>Answers</h2>`;
        questions.forEach((q, idx) => {
            printHtml += `<div class="answer-block">`;
            printHtml += `<div class="answer-number">${idx+1}. ${q.type === 'mc' ? 'Multiple Choice' : 'Long Answer'}</div>`;
            if (q.type === 'mc') {
                printHtml += `<div class="answer-text"><strong>Correct Answer:</strong> ${q.answer}</div>`;
            } else {
                const reference = q.reference && q.reference !== '(No reference)' ? q.reference : 'No reference answer provided.';
                printHtml += `<div class="answer-text"><strong>Reference Answer:</strong><br>${escapeHtml(reference)}</div>`;
            }
            printHtml += `</div>`;
        });
        printHtml += `</div>`;

        printHtml += `</body></html>`;

        const printWindow = window.open('', '_blank');
        printWindow.document.write(printHtml);
        printWindow.document.close();
        printWindow.onload = () => {
            printWindow.print();
        };
    }

    // Clear all questions
    function clearAll() {
        if (confirm('Delete all questions?')) {
            questions = [];
            renderQuestionsList();
        }
    }

    // Escape HTML for safety
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Event listeners
    qTypeSelect.addEventListener('change', toggleQuestionType);
    addBtn.addEventListener('click', addQuestion);
    clearFormBtn.addEventListener('click', clearForm);
    generatePdfBtn.addEventListener('click', generatePDF);
    clearAllBtn.addEventListener('click', clearAll);

    // Make edit/delete global
    window.editQuestion = editQuestion;
    window.deleteQuestion = deleteQuestion;

    // Initial UI setup
    renderOptionsInputs();
    toggleQuestionType();
</script>
</body>
</html>
